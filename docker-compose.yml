services:
  frontend:
    build: .
    image: mi-frontend-temp
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    image: python:3.9-slim
    volumes:
      - ./api:/app
    working_dir: /app
    command: >
      sh -c "pip install flask && python app.py"
    ports:
      - "5000:5000"
