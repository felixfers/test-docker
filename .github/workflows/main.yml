name: Multi-Tier CI Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  test-infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar código del repo
        uses: actions/checkout@v4

      - name: 2. Levantar la orquesta (Compose)
        run: |
          # Cambiamos 'docker-compose' por 'docker compose'
          docker compose up -d --build
          echo "Esperando a que los servicios inicien..."
          sleep 15 

      - name: 3. Test de salud - Frontend (Nginx)
        run: |
          curl -I http://localhost:8080 | grep "200 OK"
          echo "✅ Frontend respondiendo en puerto 8080"

      - name: 4. Test de salud - Backend (Python API)
        run: |
          curl -s http://localhost:5000/datos | grep "online"
          echo "✅ Backend respondiendo en puerto 5000"

      - name: 5. Limpieza
        run: docker compose down
