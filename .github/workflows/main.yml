name: Multi-Tier CI Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  test-infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar codigo
        uses: actions/checkout@v4

      - name: 2. Levantar con Docker Compose
        run: |
          docker compose up -d --build
          echo "Esperando a que los servicios se estabilicen..."
          sleep 20

      - name: 3. Test Frontend (Status 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Frontend OK: HTTP $STATUS"
          else
            echo "❌ Frontend FALLÓ: HTTP $STATUS"
            exit 1
          fi

      - name: 4. Test Backend (JSON Check)
        run: |
          RESPONSE=$(curl -s http://localhost:5000/datos)
          if echo "$RESPONSE" | grep -q "online"; then
            echo "✅ Backend OK: Datos recibidos"
          else
            echo "❌ Backend FALLÓ: Respuesta inesperada -> $RESPONSE"
            exit 1
          fi

      - name: 5. Limpiar
        run: docker compose down
